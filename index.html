<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ノブユキの生態</title>

    <style>
        body {
            font-family: "Hiragino Sans", sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #4a90e2;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #4a90e2;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
        }

        .profile {
            line-height: 1.8;
        }

        .hobby-list li {
            margin-bottom: 8px;
        }
    </style>
</head>

<body>

    <header>
        <h1>ノブユキの生態</h1>
        <p>日常・趣味・思考をまとめた個人サイト</p>
    </header>

    <main>
        <section>
            <h2>プロフィール</h2>
            <p class="profile">
                こんにちは、ノブユキです。<br>
                このサイトでは、自分の趣味や日常、好きなことを紹介しています。
            </p>
        </section>

        <section>
            <h2>趣味</h2>
            <ul class="hobby-list">
                <li>ゲーム</li>
                <li>音楽鑑賞</li>
                <li>プログラミング</li>
                <li>旅行</li>
            </ul>
        </section>

        <section>
            <h2>最近のひとこと</h2>
            <p>
                「継続は力なり。」
            </p>
        </section>
    </main>

    <footer>
        <p>© 2026 ノブユキの生態</p>
    </footer>

</body>
</html>
